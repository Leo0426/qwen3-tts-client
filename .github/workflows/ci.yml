# 快速内循环测试：TTSCore 不链接 MLX，swift test 即可跑完
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # mlx-audio-swift 要求 swift-tools 6.2（Xcode 26），runner 默认 Xcode 版本不够
      - name: 选择 Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [[ -z "$XCODE" ]]; then
            echo "未找到 Xcode 26，镜像可用版本："
            ls /Applications | grep -i xcode
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          swift --version

      - name: 缓存 SPM 依赖
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: swift test
        run: swift test
