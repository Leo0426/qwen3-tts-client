# 推送 v* 标签时自动构建、打包并创建 GitHub Release。
# 构建链接 MLX，必须走 xcodebuild（Metal shaders，见 CLAUDE.md）。
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 打包脚本用 git describe 取版本号

      # mlx-audio-swift 要求 swift-tools 6.2（Xcode 26），runner 默认 Xcode 版本不够
      - name: 选择 Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [[ -z "$XCODE" ]]; then
            echo "未找到 Xcode 26，镜像可用版本："
            ls /Applications | grep -i xcode
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE/Contents/Developer" >> "$GITHUB_ENV"
          swift --version

      - name: 缓存 SPM 依赖
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-${{ runner.os }}-

      - name: 构建并打包
        run: scripts/package-app.sh

      - name: 创建 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="docs/release-notes/${TAG}.md"
          if [[ -f "$NOTES" ]]; then
            gh release create "$TAG" dist/Qwen3TTS-*.zip dist/Qwen3TTS-*.zip.sha256 \
              --title "$TAG" --notes-file "$NOTES"
          else
            gh release create "$TAG" dist/Qwen3TTS-*.zip dist/Qwen3TTS-*.zip.sha256 \
              --title "$TAG" --generate-notes
          fi
